# 前端 nginx：服務 SPA 靜態檔，並將 API 路徑反向代理到 backend 容器
server {
    listen 80;
    server_name _;

    # 圖片上傳大小上限（後端未設限，這裡取合理值；nginx 預設 1m 會擋掉大部分圖片）
    client_max_body_size 20m;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # /events 與 /events/{id}（prefix match 同時涵蓋兩者）
    location /events {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 圖片上傳（multipart）
    location /upload {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 已上傳圖片的靜態服務（由後端 StaticFiles 提供）
    location /uploads/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # SPA fallback（本專案無 client routing，保留無害）
    location / {
        try_files $uri $uri/ /index.html;
    }
}
